<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f9;
    }
    .quiz-container {
      background: #ffffff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 {
      margin-bottom: 20px;
      font-size: 24px;
      color: #333;
    }
    .question {
      font-size: 18px;
      margin-bottom: 20px;
    }
    .options {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .options li {
      margin: 10px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    .score {
      font-size: 20px;
      color: #555;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h1>Quiz App</h1>
    <div class="question" id="question"></div>
    <ul class="options" id="options"></ul>
    <button id="nextButton" style="display: none;">Next Question</button>
    <div class="score" id="score" style="display: none;"></div>
  </div>

  <script>
    // Quiz data
    const quizData = [
      {
        question: "What is the capital of France?",
        options: ["Paris", "Berlin", "Madrid", "Rome"],
        answer: "Paris"
      },
      {
        question: "Which planet is known as the Red Planet?",
        options: ["Earth", "Venus", "Mars", "Jupiter"],
        answer: "Mars"
      },
      {
        question: "Who wrote 'Hamlet'?",
        options: ["Leo Tolstoy", "Mark Twain", "William Shakespeare", "Charles Dickens"],
        answer: "William Shakespeare"
      }
    ];

    // Quiz variables
    let currentQuestionIndex = 0;
    let score = 0;

    // Select DOM elements
    const questionElement = document.getElementById("question");
    const optionsElement = document.getElementById("options");
    const nextButton = document.getElementById("nextButton");
    const scoreElement = document.getElementById("score");

    // Load a question
    function loadQuestion() {
      const currentQuestion = quizData[currentQuestionIndex];
      questionElement.textContent = currentQuestion.question;

      // Clear old options
      optionsElement.innerHTML = "";

      // Display options
      currentQuestion.options.forEach(option => {
        const li = document.createElement("li");
        li.innerHTML = `<button class="option-btn">${option}</button>`;
        li.querySelector("button").addEventListener("click", () => selectOption(option));
        optionsElement.appendChild(li);
      });

      nextButton.style.display = "none"; // Hide Next button
    }

    // Handle option selection
    function selectOption(selectedOption) {
      const currentQuestion = quizData[currentQuestionIndex];

      // Check if the selected option is correct
      if (selectedOption === currentQuestion.answer) {
        score++;
      }

      // Highlight correct and wrong answers
      Array.from(optionsElement.children).forEach(li => {
        const button = li.querySelector("button");
        button.disabled = true;
        if (button.textContent === currentQuestion.answer) {
          button.style.backgroundColor = "#28a745"; // Green for correct answer
        } else if (button.textContent === selectedOption) {
          button.style.backgroundColor = "#dc3545"; // Red for wrong answer
        }
      });

      nextButton.style.display = "block"; // Show Next button
    }

    // Load the next question or display the score
    nextButton.addEventListener("click", () => {
      currentQuestionIndex++;
      if (currentQuestionIndex < quizData.length) {
        loadQuestion();
      } else {
        displayScore();
      }
    });

    // Display the final score
    function displayScore() {
      questionElement.style.display = "none";
      optionsElement.style.display = "none";
      nextButton.style.display = "none";
      scoreElement.style.display = "block";
      scoreElement.innerHTML = `You scored ${score} out of ${quizData.length}!`;
    }

    // Initialize the quiz
    loadQuestion();
  </script>
</body>
</html>
